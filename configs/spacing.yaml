# --------------------------------------------------
# This file defines DesignSystem for spacings
# --------------------------------------------------
#
# Spacing uses [grid-4 with base 16] values,
# every next value should be devisible by 4
# Eg: 2, 4, 8, 12, 16, 20, 24.....
# --------------------------------------------------

# Base size for the spacing and size system
# all of the other size at scale will be based on this value

base: 16

scale:
  1: 0.25
  2: 0.5
  3: 0.75
  4: 1
  5: 1.25
  6: 1.5
  7: 1.75
  8: 2
  9: 2.25
  10: 2.5
  11: 2.75
  12: 3
  13: 3.25
  14: 3.5
  15: 3.75
  16: 4
  17: 4.25
