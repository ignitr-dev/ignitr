name: core
description: Core layer of the Ignitr Framework, can be shared on any stack.

publish_to: "none"

version: 0.1.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_storage: ^2.1.1
  google_fonts: ^8.0.2
  http: ^1.2.2
  path_provider: ^2.1.5
  recase: ^4.1.0
  logger: any
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
